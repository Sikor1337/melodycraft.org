name: CI

# Quality checks run independently of the Pages deploy so a flaky/failing
# check never blocks the site from going live. See deploy.yml for deployment.
# Runs on PRs only (not every push to main) to keep Actions usage minimal —
# main pushes trigger just the deploy workflow.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Test
        run: npm test
